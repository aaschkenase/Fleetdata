<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch · Retention Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── DARK MODE (default) ── */
    :root {
      --bg:          #07090e;
      --surface:     #0c1018;
      --card:        #101620;
      --card-hover:  #141d2c;
      --card-sel:    #152338;
      --border:      #1e2d42;
      --border-hi:   #2a3f5c;
      --accent:      #00c4a7;
      --accent-dim:  rgba(0,196,167,.12);
      --accent-glow: rgba(0,196,167,.25);
      --text-1:      #e2eef8;
      --text-2:      #8aabca;
      --text-3:      #5a7a96;
      --green:       #00d47a;
      --green-dim:   rgba(0,212,122,.12);
      --amber:       #f5a623;
      --amber-dim:   rgba(245,166,35,.12);
      --red:         #ff4d4d;
      --red-dim:     rgba(255,77,77,.12);
      --radius:      8px;
      --radius-lg:   12px;
      --shadow:      0 4px 20px rgba(0,0,0,.5);
      --shadow-lg:   0 32px 80px rgba(0,0,0,.7);
      --dot-color:   rgba(255,255,255,.025);
      --theme-icon:  '☀';
    }

    /* ── LIGHT MODE ── */
    [data-theme="light"] {
      --bg:          #eef2f7;
      --surface:     #ffffff;
      --card:        #f8fafd;
      --card-hover:  #f0f5fb;
      --card-sel:    #e4eef8;
      --border:      #d0dce9;
      --border-hi:   #b5c8dc;
      --accent:      #009e87;
      --accent-dim:  rgba(0,158,135,.1);
      --accent-glow: rgba(0,158,135,.2);
      --text-1:      #0e1c2a;
      --text-2:      #3d5a74;
      --text-3:      #6b8da8;
      --green:       #00a85e;
      --green-dim:   rgba(0,168,94,.1);
      --amber:       #c97f00;
      --amber-dim:   rgba(201,127,0,.1);
      --red:         #d63030;
      --red-dim:     rgba(214,48,48,.1);
      --shadow:      0 4px 20px rgba(0,0,0,.08);
      --shadow-lg:   0 32px 80px rgba(0,0,0,.18);
      --dot-color:   rgba(0,0,0,.04);
      --theme-icon:  '🌙';
    }

    /* smooth theme transitions */
    *, *::before, *::after { transition: background-color .2s, border-color .2s, color .15s; }
    button, input, select, textarea { transition: background-color .2s, border-color .15s, color .1s, box-shadow .15s; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 54px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .brand-icon {
      width: 30px; height: 30px;
      background: var(--accent-dim);
      border: 1px solid rgba(0,196,167,.3);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .brand-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-1);
      line-height: 1;
    }
    .brand-sub {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .08em;
      color: var(--text-2);
      display: block;
      margin-top: 2px;
    }
    .header-nav {
      display: flex;
      gap: 2px;
      margin-left: auto;
    }
    .nav-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .14s;
    }
    .nav-btn:hover { color: var(--text-1); background: var(--card); }
    .nav-btn.active { color: var(--accent); background: var(--accent-dim); }
    .header-actions { display: flex; gap: 8px; margin-left: 12px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; cursor: pointer; transition: all .14s;
    }
    .btn-primary:hover { background: var(--accent); color: #07090e; }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text-2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; cursor: pointer; transition: all .14s;
    }
    .btn-ghost:hover { color: var(--text-1); border-color: var(--text-2); background: var(--card); }
    .btn-danger {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--red);
      background: var(--red-dim);
      color: var(--red);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; cursor: pointer; transition: all .14s;
    }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-amber {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--amber);
      background: var(--amber-dim);
      color: var(--amber);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; cursor: pointer; transition: all .14s;
    }
    .btn-amber:hover { background: var(--amber); color: #07090e; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 20px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-2);
    }
    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 22px; font-weight: 500;
      line-height: 1.15;
      margin-top: 2px;
    }
    .stat-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }
    .c-accent { color: var(--accent); }
    .c-green  { color: var(--green); }
    .c-amber  { color: var(--amber); }
    .c-red    { color: var(--red); }
    .c-muted  { color: var(--text-2); }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 0px;
      transition: grid-template-columns 0.3s cubic-bezier(.4,0,.2,1);
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .main-layout.panel-open {
      grid-template-columns: 1fr 420px;
    }

    /* ===== DISPATCHER GRID ===== */
    .dispatcher-grid {
      padding: 18px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 10px;
      align-content: start;
      min-width: 0;
    }
    .dispatcher-grid::-webkit-scrollbar { width: 3px; }
    .dispatcher-grid::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* ===== DISPATCHER CARD ===== */
    .dispatcher-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 15px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
      overflow: hidden;
    }
    .dispatcher-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--border);
      transition: background .15s;
    }
    .dispatcher-card:hover { border-color: var(--border-hi); background: var(--card-hover); }
    .dispatcher-card:hover::before { background: rgba(0,196,167,.35); }
    .dispatcher-card.selected { border-color: var(--accent); background: var(--card-sel); }
    .dispatcher-card.selected::before { background: var(--accent); }
    .dc-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 13px;
    }
    .dc-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--border-hi);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .dc-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--text-1); line-height: 1;
    }
    .dc-role { font-size: 12px; color: var(--text-2); margin-top: 3px; }
    .dc-edit-btn {
      margin-left: auto;
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text-2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; cursor: pointer; transition: all .14s;
    }
    .dc-edit-btn:hover { color: var(--text-1); border-color: var(--text-2); background: var(--card); }
    .dc-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 6px; margin-bottom: 11px;
    }
    .dc-stat { text-align: center; }
    .dc-stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 20px; font-weight: 500;
      display: block; line-height: 1;
    }
    .dc-stat-lbl {
      font-size: 9px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-2); margin-top: 3px;
    }
    .dc-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 99px;
      font-size: 10px; font-weight: 700;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .pill.green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,212,122,.2); }
    .pill.amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,.2); }
    .pill.red   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,64,64,.2); }
    .pill.blue  { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,196,167,.2); }
    .pill-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

    /* ===== DRIVER PANEL ===== */
    .driver-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .panel-header {
      padding: 13px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-top-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 9px;
    }
    .panel-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
    }
    .panel-title span { color: var(--accent); font-family: 'DM Mono', monospace; }
    .panel-btn-row { display: flex; gap: 5px; }
    .panel-close {
      width: 26px; height: 26px;
      border-radius: 5px;
      border: 1px solid var(--border-hi);
      background: transparent; color: var(--text-2);
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .14s;
    }
    .panel-close:hover { color: var(--text-1); border-color: var(--text-2); }
    .panel-filters { display: flex; gap: 4px; }
    .filter-btn {
      padding: 3px 9px; border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: .06em;
      cursor: pointer; transition: all .14s;
    }
    .filter-btn:hover { color: var(--text-1); }
    .filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(0,196,167,.3); }
    .panel-body {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* ===== DRIVER CARD (panel) ===== */
    .driver-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: all .14s;
      margin-bottom: 5px;
    }
    .driver-card:last-child { margin-bottom: 0; }
    .driver-card:hover { border-color: var(--border-hi); background: var(--card-hover); }
    .drv-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 5px;
    }
    .drv-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--text-1);
    }
    .drv-meta {
      display: flex; flex-wrap: wrap; gap: 6px;
      font-size: 11px; color: var(--text-2); align-items: center;
    }
    .drv-sep { color: var(--text-2); }
    .equip-tag {
      display: inline-block;
      padding: 1px 5px; border-radius: 3px;
      background: var(--accent-dim); color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 9px; font-weight: 600; letter-spacing: .05em;
    }
    .mono { font-family: 'DM Mono', monospace; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 8px;
      color: var(--text-3); text-align: center; padding: 32px;
    }
    .empty-icon { font-size: 28px; opacity: .45; }
    .empty-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--text-2);
    }
    .empty-sub { font-size: 12px; color: var(--text-2); max-width: 200px; line-height: 1.5; }

    /* ===== ARCHIVE VIEW ===== */
    .archive-wrap {
      flex: 1; overflow-y: auto; padding: 20px;
      min-height: 0;
    }
    .archive-wrap::-webkit-scrollbar { width: 3px; }
    .archive-wrap::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
    .archive-hdr {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 800;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .section-sub { font-size: 12px; color: var(--text-2); margin-top: 3px; }
    .select-field {
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border-hi);
      background: var(--card); color: var(--text-1);
      font-family: 'Barlow', sans-serif; font-size: 12px;
      cursor: pointer; outline: none;
    }
    .select-field:focus { border-color: var(--accent); }
    .archive-table { width: 100%; border-collapse: collapse; }
    .archive-table th {
      text-align: left; padding: 8px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .archive-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px; vertical-align: middle;
    }
    .archive-table tr:hover td { background: var(--card-hover); cursor: pointer; }
    .archive-table tr:last-child td { border-bottom: none; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(7,9,14,.6);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 500px;
      max-height: 88vh;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .modal-wide { max-width: 640px; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 800;
      letter-spacing: .07em; text-transform: uppercase;
    }
    .modal-close {
      width: 26px; height: 26px;
      border-radius: 5px; border: 1px solid var(--border-hi);
      background: transparent; color: var(--text-2);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all .14s;
    }
    .modal-close:hover { color: var(--text-1); border-color: var(--text-2); }
    .modal-body {
      padding: 20px; overflow-y: auto; flex: 1;
    }
    .modal-body::-webkit-scrollbar { width: 3px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
      flex-shrink: 0;
    }

    /* ===== FORMS ===== */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .form-full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-1);
    }
    .form-input, .form-select, .form-textarea {
      padding: 7px 9px;
      border-radius: var(--radius);
      border: 1px solid var(--border-hi);
      background: var(--card); color: var(--text-1);
      font-family: 'Barlow', sans-serif; font-size: 13px;
      outline: none; transition: border-color .14s; width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }
    .form-select { cursor: pointer; }
    .form-textarea { resize: vertical; min-height: 68px; line-height: 1.5; }
    .form-section {
      grid-column: 1 / -1;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); margin-top: 4px; margin-bottom: -4px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* ===== DRIVER PROFILE (view modal) ===== */
    .profile-hdr {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 18px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .profile-avatar {
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 800; flex-shrink: 0;
    }
    .profile-avatar.green { background: var(--green-dim); border: 2px solid var(--green); color: var(--green); }
    .profile-avatar.amber { background: var(--amber-dim); border: 2px solid var(--amber); color: var(--amber); }
    .profile-avatar.red   { background: var(--red-dim);   border: 2px solid var(--red);   color: var(--red); }
    .profile-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 19px; font-weight: 800;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .profile-sub { font-size: 11px; color: var(--text-2); margin-top: 3px; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .pf { display: flex; flex-direction: column; gap: 3px; }
    .pf-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-2);
    }
    .pf-value { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-1); font-weight: 500; }
    .profile-notes {
      padding: 9px 11px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 12px; color: var(--text-2);
      line-height: 1.5; white-space: pre-wrap; min-height: 44px;
    }
    .profile-actions {
      display: flex; gap: 8px;
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* ===== TOAST ===== */
    #toast-container {
      position: fixed; bottom: 18px; right: 18px;
      z-index: 999; display: flex; flex-direction: column; gap: 7px;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border-hi);
      color: var(--text-1); font-size: 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,.45);
      animation: toastIn .22s ease-out;
      min-width: 200px;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes toastIn {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    option { background: var(--card); color: var(--text-1); }
    /* fault badges */
    .fault-yes   { background:var(--red-dim);   color:var(--red);   border:1px solid rgba(255,77,77,.25); }
    .fault-no    { background:var(--green-dim);  color:var(--green); border:1px solid rgba(0,212,122,.25); }
    .fault-maybe { background:var(--amber-dim);  color:var(--amber); border:1px solid rgba(245,166,35,.25); }
    .fault-none  { background:var(--card);       color:var(--text-2);border:1px solid var(--border); }

    .ret-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .ret-kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .ret-kpi-val {
      font-family: 'DM Mono', monospace;
      font-size: 26px; font-weight: 500;
      line-height: 1; margin-bottom: 4px;
    }
    .ret-kpi-lbl {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-2);
    }
    .ret-kpi-sub { font-size: 11px; color: var(--text-2); margin-top: 3px; }
    .fault-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer; transition: all .14s; border: 1px solid transparent;
    }
    .fault-btn.sel-yes   { background:var(--red);   color:#fff; border-color:var(--red); }
    .fault-btn.sel-no    { background:var(--green);  color:#07090e; border-color:var(--green); }
    .fault-btn.sel-maybe { background:var(--amber);  color:#07090e; border-color:var(--amber); }
    .fault-btn:not([class*="sel-"]) { background:var(--card); color:var(--text-2); border-color:var(--border-hi); }
    .fault-btn:hover:not([class*="sel-"]) { color:var(--text-1); border-color:var(--text-2); }

function drvPerf(id){return PERF[id]||null;}
function dispPerf(dispId){
  const drvs = S.drivers.filter(d=>d.dispatcherId===dispId);
  const active = drvs.filter(d=>d.status!=='terminated');
  if(!active.length) return null;
  const ps = active.map(d=>PERF[d.id]).filter(Boolean);
  if(!ps.length) return null;
  return {
    avgRev:  Math.round(ps.reduce((s,p)=>s+p.av,0)/ps.length),
    avgRptm: Math.round(ps.reduce((s,p)=>s+p.ar,0)/ps.length*100)/100,
    avgMiles:Math.round(ps.reduce((s,p)=>s+p.am,0)/ps.length),
    totalGross: ps.reduce((s,p)=>s+p.tv,0),
  };
}

function setSyncStatus(s) {
  const el = document.getElementById('sync-dot');
  if (!el) return;
  const map = {
    loading: ['#8aabca', '⟳ Loading'],
    saving:  ['#f5a623', '↑ Saving'],
    synced:  ['#00d47a', '✓ Synced'],
    offline: ['#f5a623', '⚡ Offline'],
    error:   ['#ff4d4d', '✕ Error'],
  };
  const [color, label] = map[s] || map.synced;
  el.style.background = color;
  el.title = label;
  const txt = document.getElementById('sync-label');
  if (txt) { txt.textContent = label; txt.style.color = color; }
}

// save(): write localStorage immediately, sync Firestore in background
function save() {
  localStorage.setItem(SK, JSON.stringify({ dispatchers: S.dispatchers, drivers: S.drivers }));
  setSyncStatus('saving');
  STATE_REF.set({
    dispatchers: S.dispatchers,
    drivers:     S.drivers,
    _updated:    firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(() => setSyncStatus('synced'))
  .catch(e => { setSyncStatus('error'); console.error('Firestore save:', e); });
}

// load(): try Firestore first, fall back to localStorage, then seed
async function load() {
  setSyncStatus('loading');
  try {
    const doc = await STATE_REF.get();
    if (doc.exists) {
      const d = doc.data();
      S.dispatchers = d.dispatchers || [];
      S.drivers     = d.drivers     || [];
      // Keep localStorage in sync as cache
      localStorage.setItem(SK, JSON.stringify({ dispatchers: S.dispatchers, drivers: S.drivers }));
      setSyncStatus('synced');
    } else {
      // Nothing in Firestore yet — load localStorage or seed, then push up
      const raw = localStorage.getItem(SK);
      if (raw) {
        const p = JSON.parse(raw);
        S.dispatchers = p.dispatchers || [];
        S.drivers     = p.drivers     || [];
      } else {
        seedData();
      }
      // First-time sync: push local data up to Firestore
      await STATE_REF.set({
        dispatchers: S.dispatchers,
        drivers:     S.drivers,
        _updated:    firebase.firestore.FieldValue.serverTimestamp()
      });
      setSyncStatus('synced');
    }
  } catch(e) {
    // Offline or error — use localStorage
    setSyncStatus('offline');
    const raw = localStorage.getItem(SK);
    if (raw) {
      const p = JSON.parse(raw);
      S.dispatchers = p.dispatchers || [];
      S.drivers     = p.drivers     || [];
    } else {
      seedData();
    }
  }
  // Load PERF updates from localStorage (performance history — re-importable from Excel)
  const rp = localStorage.getItem(SK_PERF);
  if (rp) {
    try { Object.assign(PERF, JSON.parse(rp)); } catch(e) {}
  }
}

  localStorage.setItem(SK_PERF, JSON.stringify(PERF));

// ============================================================
//  HELPERS
// ============================================================
function dispById(id) { return S.dispatchers.find(d => d.id === id); }
function drvById(id)  { return S.drivers.find(d => d.id === id); }

function drvsByDisp(dispId) {
  return S.drivers.filter(d => d.dispatcherId === dispId);
}

function dispStats(dispId) {
  const all  = drvsByDisp(dispId);
  const act  = all.filter(d => d.status === 'active').length;
  const risk = all.filter(d => d.status === 'at_risk').length;
  const term = all.filter(d => d.status === 'terminated').length;
  const tot  = all.length;
  // Raw retention counts ALL terminated drivers
  const ret  = tot > 0 ? Math.round((tot - term) / tot * 100) : null;
  // Adjusted retention excludes drivers where dispatcher was NOT at fault
  const faultTerm = all.filter(d => d.status === 'terminated' && d.dispatcherFault !== 'no').length;
  const retAdj = tot > 0 ? Math.round((tot - faultTerm) / tot * 100) : null;
  const noFaultCount = term - faultTerm;
  const unreviewed = all.filter(d => d.status === 'terminated' && !d.dispatcherFault).length;
  const cur  = all.filter(d => d.status !== 'terminated');
  const avgD = cur.length > 0
    ? cur.reduce((s,d) => s + Math.floor((Date.now() - new Date(d.hireDate)) / 86400000), 0) / cur.length
    : 0;
  return { act, risk, term, tot, ret, retAdj, noFaultCount, unreviewed, avgD };
}

function fleetStats() {
  const all  = S.drivers;
  const act  = all.filter(d => d.status === 'active').length;
  const risk = all.filter(d => d.status === 'at_risk').length;
  const term = all.filter(d => d.status === 'terminated').length;
  const tot  = all.length;
  const faultTerm = all.filter(d => d.status === 'terminated' && d.dispatcherFault !== 'no').length;
  const ret  = tot > 0 ? Math.round((tot - term) / tot * 100) : 0;
  const retAdj = tot > 0 ? Math.round((tot - faultTerm) / tot * 100) : 0;
  const unreviewed = all.filter(d => d.status === 'terminated' && !d.dispatcherFault).length;
  const cur  = all.filter(d => d.status !== 'terminated');
  const avgD = cur.length > 0
    ? cur.reduce((s,d) => s + Math.floor((Date.now() - new Date(d.hireDate)) / 86400000), 0) / cur.length
    : 0;
  const trucks = new Set(cur.filter(d => d.truckNumber).map(d => d.truckNumber)).size;
  return { act, risk, term, tot, ret, retAdj, unreviewed, avgD, trucks };
}

function fmtTenure(days) {
  days = Math.round(days);
  if (days < 1)   return '< 1d';
  if (days < 30)  return `${days}d`;
  if (days < 365) return `${Math.round(days/30)}mo`;
  return `${(days/365).toFixed(1)}yr`;
}

function fmtPay(type, rate) {
  switch(type) {
    case 'CPM':             return `$${parseFloat(rate).toFixed(2)}/mi`;
    case 'Percentage':      return `${rate}%`;
    case 'Salary':          return `$${parseInt(rate).toLocaleString()}/wk`;
    case 'Percentage + FSC':return `${rate}% + FSC`;
    default: return rate;
  }
}

function initials(name) {
  return name.split(' ').map(n => n[0] || '').join('').toUpperCase().slice(0,2);
}

function sColor(status) {
  return status === 'active' ? 'green' : status === 'at_risk' ? 'amber' : 'red';
}

function sLabel(status) {
  return status === 'active' ? 'Active' : status === 'at_risk' ? 'At Risk' : 'Terminated';
}

function fmtDate(s) {
  if (!s) return '—';
  return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function retColor(pct) {
  if (pct === null) return 'c-muted';
  if (pct >= 85)    return 'c-green';
  if (pct >= 70)    return 'c-amber';
  return 'c-red';
}

function getAlerts() {
  const alerts = [];
  for (const drv of S.drivers) {
    if (drv.status === 'terminated') continue;
    const p = PERF[drv.id];
    if (!p || p.h.length < 2) continue;
    const latest = p.h[0][4];
    const prev   = p.h[1][4];
    if (prev > 0 && latest < prev * 0.8) {
      const pct = Math.round((latest - prev) / prev * 100);
      const disp = dispById(drv.dispatcherId);
      alerts.push({ drv, disp, pct, latest, prev, week: p.h[0][0] });
    }
  }
  return alerts.sort((a,b) => a.pct - b.pct);
}

// ============================================================
//  RETENTION VIEW
// ============================================================
function renderRetention() {
  const el = document.getElementById('ret-el');
  if (!el) return;

  const allTerm = S.drivers.filter(d => d.status === 'terminated');
  const reviewed  = allTerm.filter(d => d.dispatcherFault).length;
  const unrev     = allTerm.length - reviewed;
  const faultYes  = allTerm.filter(d => d.dispatcherFault === 'yes').length;
  const faultNo   = allTerm.filter(d => d.dispatcherFault === 'no').length;
  const faultMay  = allTerm.filter(d => d.dispatcherFault === 'maybe').length;

  // Fleet adjusted retention
  const allDrvs   = S.drivers;
  const tot       = allDrvs.length;
  const faultTerm = allTerm.filter(d => d.dispatcherFault !== 'no').length;
  const retAdj    = tot > 0 ? Math.round((tot - faultTerm) / tot * 100) : 0;
  const retRaw    = tot > 0 ? Math.round((tot - allTerm.length) / tot * 100) : 0;

  // Avg tenure at termination
  const tenures = allTerm.filter(d => d.hireDate && d.terminatedDate).map(d =>
    Math.floor((new Date(d.terminatedDate) - new Date(d.hireDate)) / 86400000)
  );
  const avgTenure = tenures.length ? Math.round(tenures.reduce((s,v) => s+v, 0) / tenures.length) : 0;

  // Filter state
  const dispF  = el.dataset.dispFilter  || 'all';
  const faultF = el.dataset.faultFilter || 'all';

  let rows = [...allTerm].sort((a,b) => {
    const da = a.terminatedDate ? new Date(a.terminatedDate) : new Date(0);
    const db = b.terminatedDate ? new Date(b.terminatedDate) : new Date(0);
    return db - da;
  });
  if (dispF  !== 'all') rows = rows.filter(d => d.dispatcherId === dispF);
  if (faultF !== 'all') rows = rows.filter(d => (d.dispatcherFault||'none') === faultF);

  const faultBadge = (f) => {
    const map = { yes:'fault-yes', no:'fault-no', maybe:'fault-maybe' };
    const lbl = { yes:'Dispatcher', no:'Not Dispatcher', maybe:'Unclear' };
    const cls = map[f] || 'fault-none';
    const txt = lbl[f] || 'Unreviewed';
    return `<span class="pill ${cls}">${txt}</span>`;
  };

  el.innerHTML = `
    <div class="archive-hdr" style="margin-bottom:16px;">
      <div>
        <div class="section-title">Retention Review</div>
        <div class="section-sub">Review each termination and mark dispatcher fault — adjusts retention scores automatically</div>
      </div>
    </div>

    <div class="ret-summary-grid">
      <div class="ret-kpi">
        <div class="ret-kpi-val">${allTerm.length}</div>
        <div class="ret-kpi-lbl">Total Terminated</div>
        <div class="ret-kpi-sub">${reviewed} reviewed · ${unrev} pending</div>
      </div>
      <div class="ret-kpi">
        <div class="ret-kpi-val c-red">${faultYes}</div>
        <div class="ret-kpi-lbl">Dispatcher Fault</div>
        <div class="ret-kpi-sub">counts against score</div>
      </div>
      <div class="ret-kpi">
        <div class="ret-kpi-val c-amber">${faultMay}</div>
        <div class="ret-kpi-lbl">Unclear / Maybe</div>
        <div class="ret-kpi-sub">still counts until resolved</div>
      </div>
      <div class="ret-kpi">
        <div class="ret-kpi-val c-green">${faultNo}</div>
        <div class="ret-kpi-lbl">Not Dispatcher Fault</div>
        <div class="ret-kpi-sub">excluded from score</div>
      </div>
      <div class="ret-kpi">
        <div class="ret-kpi-val c-accent">${retAdj}%</div>
        <div class="ret-kpi-lbl">Adjusted Fleet Retention</div>
        <div class="ret-kpi-sub">Raw: ${retRaw}%</div>
      </div>
      <div class="ret-kpi">
        <div class="ret-kpi-val">${fmtTenure(avgTenure)}</div>
        <div class="ret-kpi-lbl">Avg Tenure at Exit</div>
        <div class="ret-kpi-sub">across all terminated</div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
      <select class="select-field" onchange="retFilter('disp',this.value)" id="ret-disp-f">
        <option value="all">All Dispatchers</option>
        ${S.dispatchers.map(d => `<option value="${d.id}" ${dispF===d.id?'selected':''}>${d.name}</option>`).join('')}
      </select>
      <select class="select-field" onchange="retFilter('fault',this.value)" id="ret-fault-f">
        <option value="all">All Statuses</option>
        <option value="none"  ${faultF==='none' ?'selected':''}>Unreviewed</option>
        <option value="yes"   ${faultF==='yes'  ?'selected':''}>Dispatcher Fault</option>
        <option value="maybe" ${faultF==='maybe'?'selected':''}>Unclear</option>
        <option value="no"    ${faultF==='no'   ?'selected':''}>Not Fault</option>
      </select>
      <span style="font-size:12px;color:var(--text-2);">${rows.length} record${rows.length!==1?'s':''}</span>
      ${unrev > 0 ? `<span style="font-size:12px;color:var(--amber);margin-left:4px;">⚠ ${unrev} unreviewed — click to review</span>` : `<span style="font-size:12px;color:var(--green);">✓ All reviewed</span>`}
    </div>

    ${!rows.length
      ? `<div class="empty-state" style="height:160px;"><div class="empty-icon">✅</div><div class="empty-title">No Records Match</div></div>`
      : `<table class="archive-table">
          <thead><tr>
            <th>Driver</th><th>Dispatcher</th>
            <th>Hire Date</th><th>Term Date</th><th>Tenure</th>
            <th>Reason</th><th>Fault?</th><th></th>
          </tr></thead>
          <tbody>
            ${rows.map(r => {
              const disp = dispById(r.dispatcherId);
              const days = r.hireDate && r.terminatedDate
                ? Math.floor((new Date(r.terminatedDate) - new Date(r.hireDate)) / 86400000) : 0;
              const urgency = !r.dispatcherFault ? 'border-left:3px solid var(--amber);' : '';
              return `<tr style="${urgency}cursor:pointer;" onclick="openRetentionReview('${r.id}')">
                <td><strong>${r.name}</strong></td>
                <td style="color:var(--text-2)">${disp ? disp.name : '<span style="color:var(--amber)">Unassigned</span>'}</td>
                <td class="mono" style="font-size:11px;color:var(--text-2)">${fmtDate(r.hireDate)}</td>
                <td class="mono" style="font-size:11px;color:var(--red)">${fmtDate(r.terminatedDate)}</td>
                <td class="mono">${days > 0 ? fmtTenure(days) : '—'}</td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--text-2);">${r.terminationReason || '<span style="color:var(--text-3)">—</span>'}</td>
                <td>${faultBadge(r.dispatcherFault)}</td>
                <td style="text-align:right;"><span style="font-size:10px;color:var(--text-2)">Review →</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`
    }`;
}

function retFilter(type, val) {
  const el = document.getElementById('ret-el');
  if (!el) return;
  if (type === 'disp')  el.dataset.dispFilter  = val;
  if (type === 'fault') el.dataset.faultFilter = val;
  renderRetention();
}

  const days = r.hireDate && r.terminatedDate

  const fault = r.dispatcherFault || '';

  openModal(`
    <div class="modal">
      <div class="modal-header">

        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);">
          <div class="profile-avatar red">${initials(r.name)}</div>

            <div class="profile-name">${r.name}</div>

          <div class="form-label" style="margin-bottom:10px;">Was the dispatcher at fault for this termination?</div>
          <div style="display:flex;gap:8px;">
            <button id="fb-yes"   class="fault-btn ${fault==='yes'?'sel-yes':''}"   onclick="setFaultBtn('yes')">✗ Yes — Dispatcher</button>
            <button id="fb-no"    class="fault-btn ${fault==='no'?'sel-no':''}"     onclick="setFaultBtn('no')">✓ No — Not Fault</button>
            <button id="fb-maybe" class="fault-btn ${fault==='maybe'?'sel-maybe':''}" onclick="setFaultBtn('maybe')">? Maybe / Unclear</button>
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--text-2);" id="fault-hint">
            ${fault === 'no' ? '✓ This termination will <strong style="color:var(--green)">NOT count</strong> against the dispatcher&#39;s retention score.' :
              fault ? 'This termination <strong style="color:var(--red)">counts</strong> against the dispatcher&#39;s retention score.' :
              'Not yet reviewed — currently counting against retention.'}
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group form-full">
            <label class="form-label">Termination Reason</label>
            <select class="form-select" id="rev-reason">
              <option value="">— Select reason —</option>
              ${TERM_REASONS.map(t => `<option value="${t}" ${r.terminationReason===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="form-group form-full">
            <label class="form-label">Notes / Details</label>
            <textarea class="form-textarea" id="rev-notes" placeholder="What happened? Any context that should be on record...">${r.notes||''}</textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveRetentionReview('${drvId}')">Save Review</button>
      </div>
    </div>`);
}

function setFaultBtn(val) {
  ['yes','no','maybe'].forEach(v => {
    const btn = document.getElementById('fb-' + v);
    if (!btn) return;
    btn.className = 'fault-btn' + (v === val ? ' sel-' + v : '');
  });
  document.getElementById('fb-yes').dataset.selected = '';
  document.getElementById('fb-no').dataset.selected  = '';
  document.getElementById('fb-maybe').dataset.selected = '';
  document.getElementById('fb-' + val).dataset.selected = 'true';
  const hint = document.getElementById('fault-hint');
  if (hint) {
    hint.innerHTML = val === 'no'
      ? '✓ This termination will <strong style="color:var(--green)">NOT count</strong> against the dispatcher&#39;s retention score.'
      : '✗ This termination <strong style="color:var(--red)">counts</strong> against the dispatcher&#39;s retention score.';
  }
}

function saveRetentionReview(drvId) {
  const selBtn = ['yes','no','maybe'].find(v => {
    const btn = document.getElementById('fb-' + v);
    return btn && btn.dataset.selected === 'true';
  });
  const reason = document.getElementById('rev-reason')?.value || '';
  const notes  = document.getElementById('rev-notes')?.value.trim() || '';
  const i = S.drivers.findIndex(d => d.id === drvId);
  if (i > -1) {
    if (selBtn) S.drivers[i].dispatcherFault = selBtn;
    if (reason) S.drivers[i].terminationReason = reason;
    S.drivers[i].notes = notes;
  }
  save();
  closeModal();
  toast('Review saved' + (selBtn === 'no' ? ' — excluded from retention score' : ''), selBtn === 'no' ? 'success' : 'info');
  renderStats();
  if (S.view === 'retention') renderRetention();
  else renderMain();
}

function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor = 'var(--border-hi)';
  const file = e.dataTransfer.files[0];
  if (file) parseWeeklyFile(file);
}

function handleFileSelect(inp) {
  const file = inp.files[0];
  if (file) parseWeeklyFile(file);
}

function parseWeeklyFile(file) {
  const status = document.getElementById('upload-status');
  status.innerHTML = `<div style="color:var(--text-2);font-size:12px;">Reading file...</div>`;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      let totalNew = 0, totalMatched = 0;
      const unmatched = [];
      const skippedWeeks = [];

      // Build name->id lookup (uppercase)
      const nameMap = {};
      for (const drv of S.drivers) {
        nameMap[drv.name.toUpperCase()] = drv.id;
      }

      for (const sheetName of wb.SheetNames) {
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

        // Parse date from sheet name like "4.26.2026"
        let weekDate = '';
        const dm = sheetName.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
        if (dm) {
          weekDate = `${dm[3]}-${dm[1].padStart(2,'0')}-${dm[2].padStart(2,'0')}`;
        } else {
          weekDate = sheetName;
        }

        let foundData = false;
        for (const row of rows) {
          const name = String(row[0]||'').trim().toUpperCase();
          const type = String(row[1]||'').trim();
          if (!name || name === 'DRIVER' || !['Owner','Company'].includes(type)) continue;

          const did = nameMap[name];
          const sf = v => { try { return parseFloat(String(v).replace(/[$,]/g,''))||0; } catch{ return 0; } };
          const newRow = [weekDate, Math.round(sf(row[3])), Math.round(sf(row[4])*1000)/1000,
                          Math.round(sf(row[5])*1000)/1000, Math.round(sf(row[6])*100)/100,
                          Math.round(sf(row[7])*100)/100];

          if (!did) {
            if (!unmatched.find(u => u === name)) unmatched.push(name);
            continue;
          }

          // Check if this week already exists
          if (!PERF[did]) {
            PERF[did] = {w:0,am:0,ar:0,dh:0,av:0,ap:0,tv:0,tm:0,h:[]};
          }
          const alreadyHas = PERF[did].h.some(r => r[0] === weekDate);
          if (alreadyHas) { if(!skippedWeeks.includes(weekDate)) skippedWeeks.push(weekDate); continue; }

          // Prepend new week (newest first)
          PERF[did].h.unshift(newRow);
          // Recalc averages
          const h = PERF[did].h;
          const n = h.length;
          PERF[did].w  = n;
          PERF[did].am = Math.round(h.reduce((s,r)=>s+r[1],0)/n);
          PERF[did].ar = Math.round(h.reduce((s,r)=>s+r[2],0)/n*1000)/1000;
          PERF[did].dh = Math.round(h.reduce((s,r)=>s+r[3],0)/n*1000)/1000;
          PERF[did].av = Math.round(h.reduce((s,r)=>s+r[4],0)/n);
          PERF[did].ap = Math.round(h.reduce((s,r)=>s+r[5],0)/n);
          PERF[did].tv = Math.round(h.reduce((s,r)=>s+r[4],0));
          PERF[did].tm = Math.round(h.reduce((s,r)=>s+r[1],0));
          totalMatched++;
          foundData = true;
        }
        if (foundData) totalNew++;
      }

      savePerf();

      const skipMsg = skippedWeeks.length ? `<div style="color:var(--amber);font-size:11px;margin-top:6px;">⚠ ${skippedWeeks.length} week(s) already in history — skipped duplicates.</div>` : '';
      const unmMsg  = unmatched.length   ? `<div style="color:var(--text-2);font-size:11px;margin-top:8px;"><strong style="color:var(--amber);">${unmatched.length} unrecognized name(s):</strong> ${unmatched.slice(0,8).join(', ')}${unmatched.length>8?'…':''}<br>Add these drivers manually and re-upload.</div>` : '';

      status.innerHTML = `
        <div style="padding:12px;background:var(--green-dim);border:1px solid rgba(0,212,122,.2);border-radius:var(--radius);margin-bottom:8px;">
          <div style="color:var(--green);font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:13px;">✓ Upload Complete</div>
          <div style="color:var(--text-1);font-size:12px;margin-top:4px;">${totalMatched} driver records updated across ${totalNew} sheet(s)</div>
          ${skipMsg}${unmMsg}
        </div>
        <button class="btn-primary" onclick="closeModal();render();">View Updated Dashboard</button>`;
    } catch(err) {
      status.innerHTML = `<div style="color:var(--red);font-size:12px;">Error reading file: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

            <select class="form-select" id="dr">

            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-input" id="dp2" value="${ex?ex.phone||'':''}" placeholder="312-555-0100">
          </div>
          <div class="form-group form-full">
            <label class="form-label">Email</label>
            <input class="form-input" id="de" type="email" value="${ex?ex.email||'':''}" placeholder="name@tagtrans.com">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        ${ex ? `<button class="btn-danger" onclick="deleteDisp('${editId}')">Delete</button>` : ''}
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveDisp('${editId||''}')">Save</button>
      </div>
    </div>`);
}

function saveDisp(editId) {
  const name = document.getElementById('dn').value.trim();
  if (!name) { toast('Name is required','error'); return; }
  const data = {
    name,
    role:  document.getElementById('dr').value,
    phone: document.getElementById('dp2').value.trim(),
    email: document.getElementById('de').value.trim(),
  };
  if (editId) {
    const i = S.dispatchers.findIndex(d => d.id === editId);
    if (i > -1) S.dispatchers[i] = { ...S.dispatchers[i], ...data };
    toast('Dispatcher updated','success');
  } else {
    S.dispatchers.push({ id:uid(), ...data, createdAt: today() });
    toast('Dispatcher added','success');
  }
  save(); closeModal(); render();
}

function deleteDisp(id) {
  const d = dispById(id);
  const cnt = drvsByDisp(id).length;
  if (!confirm(`Delete ${d.name}?${cnt?` Their ${cnt} driver records will also be removed.`:''}`)) return;
  S.drivers     = S.drivers.filter(r => r.dispatcherId !== id);
  S.dispatchers = S.dispatchers.filter(d => d.id !== id);
  if (S.sel === id) S.sel = null;
  save(); closeModal(); toast('Dispatcher deleted','info'); render();
}

// ============================================================
//  MODAL: ADD / EDIT DRIVER
// ============================================================
function openDrvModal(editId, defaultDispId) {
  const ex = editId ? drvById(editId) : null;
  const preDisp = defaultDispId || (ex ? ex.dispatcherId : '');
  openModal(`
    <div class="modal modal-wide">
      <div class="modal-header">
        <div class="modal-title">${ex ? 'Edit Driver' : 'Add Driver'}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">

          <div class="form-group form-full">
            <label class="form-label">Full Name</label>
            <input class="form-input" id="vn" value="${ex?ex.name:''}" placeholder="e.g. John Smith">
          </div>

          <div class="form-group">
            <label class="form-label">Dispatcher</label>
            <select class="form-select" id="vd">
              <option value="">— Select —</option>
              ${S.dispatchers.map(d=>`<option value="${d.id}" ${preDisp===d.id?'selected':''}>${d.name}</option>`).join('')}
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="vs" ${ex&&ex.status==='terminated'?'disabled':''}>
              <option value="active"   ${!ex||ex.status==='active'  ?'selected':''}>Active</option>
              <option value="at_risk"  ${ex&&ex.status==='at_risk'  ?'selected':''}>At Risk</option>
              ${ex&&ex.status==='terminated'?'<option value="terminated" selected>Terminated</option>':''}
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Hire Date</label>
            <input class="form-input" id="vh" type="date" value="${ex?ex.hireDate:today()}">
          </div>

          <div class="form-group">
            <label class="form-label">Home State</label>
            <select class="form-select" id="vst">
              <option value="">— Select —</option>
              ${US_STATES.map(s=>`<option ${ex&&ex.homeState===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>

          <div class="form-section">Equipment & Pay</div>

          <div class="form-group">
            <label class="form-label">Equipment Type</label>
            <select class="form-select" id="ve">
              ${EQUIP_TYPES.map(e=>`<option ${ex&&ex.equipmentType===e?'selected':''}>${e}</option>`).join('')}
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Pay Structure</label>
            <select class="form-select" id="vpt" onchange="updPayLabel()">
              ${PAY_TYPES.map(p=>`<option ${ex&&ex.payType===p?'selected':''}>${p}</option>`).join('')}
            </select>
          </div>

          <div class="form-group form-full">
            <label class="form-label" id="vprl">Pay Rate</label>
            <input class="form-input" id="vpr" value="${ex?ex.payRate:''}" placeholder="0.58">
          </div>

          <div class="form-section">Equipment Assignment</div>

          <div class="form-group">
            <label class="form-label">Truck #</label>
            <input class="form-input" id="vtk" value="${ex?ex.truckNumber||'':''}" placeholder="T-201">
          </div>

          <div class="form-group">
            <label class="form-label">Trailer #</label>
            <input class="form-input" id="vtr" value="${ex?ex.trailerNumber||'':''}" placeholder="TR-441">
          </div>

          <div class="form-group form-full">
            <label class="form-label">Notes / Flags</label>
            <textarea class="form-textarea" id="vno" placeholder="Performance notes, red flags, anything relevant...">${ex?ex.notes||'':''}</textarea>
          </div>

        </div>
      </div>
      <div class="modal-footer">
        ${ex&&ex.status!=='terminated' ? `<button class="btn-danger" onclick="openTermModal('${editId}')">Terminate</button>` : ''}
        ${ex&&ex.status==='terminated' ? `<button class="btn-amber" onclick="reactivate('${editId}')">Reactivate</button>` : ''}
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveDrv('${editId||''}')">Save</button>
      </div>
    </div>`);
  updPayLabel();
}

function updPayLabel() {
  const t = document.getElementById('vpt')?.value;
  const lbl = document.getElementById('vprl');
  const inp = document.getElementById('vpr');
  if (!lbl||!inp) return;
  const map = { CPM:'Rate ($/mile)  e.g. 0.58', Percentage:'Percentage (%)  e.g. 28',
    Salary:'Weekly Salary ($)  e.g. 1400', 'Percentage + FSC':'Base % (+ FSC)  e.g. 27' };
  lbl.textContent = t && map[t] ? map[t].split('  ')[0] : 'Pay Rate';
  inp.placeholder = t && map[t] ? map[t].split('  e.g. ')[1] : '';
}

function saveDrv(editId) {
  const name = document.getElementById('vn').value.trim();
  const disp = document.getElementById('vd').value;
  if (!name) { toast('Name is required','error'); return; }
  if (!disp) { toast('Please select a dispatcher','error'); return; }
  const data = {
    name, dispatcherId: disp,
    status:        document.getElementById('vs').value,
    hireDate:      document.getElementById('vh').value,
    homeState:     document.getElementById('vst').value,
    equipmentType: document.getElementById('ve').value,
    payType:       document.getElementById('vpt').value,
    payRate:       document.getElementById('vpr').value.trim(),
    truckNumber:   document.getElementById('vtk').value.trim(),
    trailerNumber: document.getElementById('vtr').value.trim(),
    notes:         document.getElementById('vno').value.trim(),
  };
  if (editId) {
    const i = S.drivers.findIndex(d => d.id === editId);
    if (i > -1) S.drivers[i] = { ...S.drivers[i], ...data };
    toast('Driver updated','success');
  } else {
    S.drivers.push({ id:uid(), ...data, terminatedDate:null, terminationReason:null, createdAt:today() });
    toast('Driver added','success');
  }
  save(); closeModal(); renderStats(); renderMain();
}

// ============================================================
//  MODAL: VIEW DRIVER
// ============================================================
function openDrvView(drvId) {
  const r = drvById(drvId);
  if (!r) return;
  const disp = dispById(r.dispatcherId);
  const col  = sColor(r.status);
  const days = Math.floor((r.status==='terminated'
    ? new Date(r.terminatedDate) - new Date(r.hireDate)
    : Date.now()                 - new Date(r.hireDate)
  ) / 86400000);

  openModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Driver Profile</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">

            <div class="profile-sub">${disp?disp.name:'Unassigned'} · ${r.equipmentType}</div>
            <div style="margin-top:6px;">
              <span class="pill ${col}"><span class="pill-dot"></span>${sLabel(r.status)}</span>

          </div>
        </div>

        <div class="profile-grid">
          <div class="pf">
            <div class="pf-label">Pay Structure</div>
            <div class="pf-value">${fmtPay(r.payType, r.payRate)}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Pay Type</div>
            <div class="pf-value">${r.payType}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Home State</div>
            <div class="pf-value">${r.homeState||'—'}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Tenure</div>
            <div class="pf-value">${fmtTenure(days)}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Hire Date</div>
            <div class="pf-value">${fmtDate(r.hireDate)}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Equipment</div>
            <div class="pf-value">${r.equipmentType}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Truck</div>
            <div class="pf-value">${r.truckNumber||'—'}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Trailer</div>
            <div class="pf-value">${r.trailerNumber||'—'}</div>
          </div>
          ${r.status==='terminated' ? `
          <div class="pf">
            <div class="pf-label">Term Date</div>
            <div class="pf-value" style="color:var(--red)">${fmtDate(r.terminatedDate)}</div>
          </div>
          <div class="pf">
            <div class="pf-label">Term Reason</div>
            <div class="pf-value" style="color:var(--red)">${r.terminationReason||'—'}</div>
          </div>` : ''}
        </div>

        ${r.notes ? `
          <div class="pf-label" style="margin-bottom:6px;">Notes</div>
          <div class="profile-notes">${r.notes}</div>` : ''
        }

        ${(()=>{
          const p=drvPerf(r.id);
          if(!p) return '';
          return `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div class="pf-label" style="margin-bottom:8px;">Performance — ${p.w} Weeks of Data</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px;">
              <div class="pf"><div class="pf-label">Avg Rev/Wk</div><div class="pf-value c-accent">$${p.av.toLocaleString()}</div></div>
              <div class="pf"><div class="pf-label">Avg RPTM</div><div class="pf-value">${p.ar.toFixed(3)}</div></div>
              <div class="pf"><div class="pf-label">Avg Mi/Wk</div><div class="pf-value">${p.am.toLocaleString()}</div></div>
              <div class="pf"><div class="pf-label">Avg DH %</div><div class="pf-value">${(p.dh*100).toFixed(1)}%</div></div>
            </div>
            <div class="pf-label" style="margin-bottom:6px;">Total Revenue: <span style="color:var(--accent);font-family:DM Mono,monospace;">$${p.tv.toLocaleString()}</span> &nbsp;|&nbsp; Total Miles: <span style="font-family:DM Mono,monospace;">${p.tm.toLocaleString()}</span></div>
            <div style="overflow-x:auto;">
              <table style="width:100%;border-collapse:collapse;font-size:10px;font-family:DM Mono,monospace;">

            : `<button class="btn-amber"  onclick="reactivate('${r.id}')">Reactivate</button>`
          }
        </div>
      </div>
    </div>`);
}

// ============================================================
//  MODAL: TERMINATE
// ============================================================
function openTermModal(drvId) {
  const r = drvById(drvId);
  if (!r) return;
  openModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" style="color:var(--red);">Terminate Driver</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-2);margin-bottom:16px;line-height:1.5;">
          Terminating <strong style="color:var(--text-1);">${r.name}</strong>.
          This will archive the record and count against dispatcher retention.
        </p>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Termination Date</label>
            <input class="form-input" id="td" type="date" value="${today()}">
          </div>
          <div class="form-group">
            <label class="form-label">Reason</label>
            <select class="form-select" id="tr2">
              ${TERM_REASONS.map(r=>`<option>${r}</option>`).join('')}
            </select>
          </div>
          <div class="form-group form-full">
            <label class="form-label">Notes</label>
            <textarea class="form-textarea" id="tn" placeholder="Any additional context...">${r.notes||''}</textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-danger" onclick="confirmTerm('${drvId}')">Confirm Termination</button>
      </div>
    </div>`);
}

function confirmTerm(drvId) {
  const date   = document.getElementById('td').value;
  const reason = document.getElementById('tr2').value;
  const notes  = document.getElementById('tn').value.trim();
  if (!date) { toast('Set a termination date','error'); return; }
  const i = S.drivers.findIndex(d => d.id === drvId);
  if (i > -1) Object.assign(S.drivers[i], { status:'terminated', terminatedDate:date, terminationReason:reason, notes });
  save(); closeModal(); toast(`${S.drivers[i]?.name||'Driver'} terminated`,'info');
  renderStats(); renderMain();
}

function reactivate(drvId) {
  const i = S.drivers.findIndex(d => d.id === drvId);
  if (i > -1) Object.assign(S.drivers[i], { status:'active', terminatedDate:null, terminationReason:null });
  save(); closeModal(); toast('Driver reactivated','success');
  renderStats(); renderMain();
}


// ============================================================
//  UNASSIGNED DRIVER QUICK-ASSIGN
// ============================================================
function openUnassignedModal() {
  const unassigned = S.drivers.filter(d => !d.dispatcherId && d.status !== 'terminated');
  openModal(`
    <div class="modal modal-wide">
      <div class="modal-header">
        <div class="modal-title">⚠ Assign Dispatchers</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-2);font-size:12px;margin-bottom:16px;">These drivers were imported without a dispatcher. Assign each one to get them tracking correctly.</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${unassigned.map(r => `
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);">
              <div style="flex:1;">
                <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;">${r.name}</div>
                <div style="font-size:11px;color:var(--text-2);">Hired ${fmtDate(r.hireDate)} · ${r.driverType}</div>
              </div>
              <select onchange="quickAssign('${r.id}',this.value)" style="padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border-hi);background:var(--card);color:var(--text-1);font-size:12px;min-width:180px;">
                <option value="">— Select Dispatcher —</option>
                ${S.dispatchers.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}
              </select>
            </div>`).join('')}
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal()">Close</button>
        <button class="btn-primary" onclick="closeModal();render();">Done</button>
      </div>
    </div>`);
}

function quickAssign(drvId, dispId) {
  const i = S.drivers.findIndex(d => d.id === drvId);
  if (i > -1 && dispId) {
    S.drivers[i].dispatcherId = dispId;
    S.drivers[i].notes = S.drivers[i].notes.replace('Needs dispatcher. ','').replace('Needs dispatcher','').trim();
    save();
    toast(S.drivers[i].name + ' assigned','success');
  }
}

// ============================================================
//  TOAST
// ============================================================
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

function today() { return new Date().toISOString().slice(0,10); }

// ============================================================
//  THEME
// ============================================================
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  applyTheme(next);
  localStorage.setItem('tagtrans_theme', next);
}

function applyTheme(mode) {
  if (mode === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = mode === 'light' ? '🌙' : '☀';
}

function loadTheme() {
  const saved = localStorage.getItem('tagtrans_theme') || 'dark';
  applyTheme(saved);
}

// ============================================================
//  EVENTS
// ============================================================
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ============================================================
//  INIT
// ============================================================
loadTheme();
load().then(() => render());
</script>
</body>
</html>
